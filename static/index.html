<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medicine Stock Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f0f4f0;
      --card: #ffffff;
      --green: #2d6a4f;
      --green-light: #52b788;
      --green-pale: #d8f3dc;
      --red: #bc4749;
      --red-pale: #ffe5e5;
      --amber: #e07c00;
      --amber-pale: #fff3cd;
      --text: #1b2e24;
      --muted: #6b7f73;
      --border: #cde0d3;
      --shadow: 0 2px 16px rgba(45,106,79,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--green);
      color: white;
      padding: 28px 40px 24px;
      display: flex;
      align-items: flex-end;
      gap: 14px;
    }
    header .pill {
      background: var(--green-light);
      border-radius: 50%;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      line-height: 1;
    }
    header p { font-size: 0.88rem; opacity: 0.75; margin-top: 4px; }

    /* LAYOUT */
    .page { max-width: 960px; margin: 0 auto; padding: 36px 24px 60px; }

    /* FORM CARD */
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 36px;
    }
    .card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--green);
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 8px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    @media(max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

    label { display: block; font-size: 0.82rem; font-weight: 600;
            color: var(--muted); margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.97rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--bg);
      transition: border 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus { border-color: var(--green-light); box-shadow: 0 0 0 3px rgba(82,183,136,0.15); }
    input.error { border-color: var(--red); }

    .error-msg {
      font-size: 0.8rem;
      color: var(--red);
      margin-top: 4px;
      min-height: 18px;
    }

    .btn-add {
      background: var(--green);
      color: white;
      border: none;
      padding: 13px 32px;
      border-radius: 10px;
      font-size: 0.97rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-add:hover { background: #235c42; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }
    .btn-add:disabled { background: #aac4b4; cursor: not-allowed; transform: none; }

    /* TOAST */
    #toast {
      position: fixed; top: 24px; right: 24px;
      padding: 14px 22px; border-radius: 12px;
      font-weight: 500; font-size: 0.92rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
      max-width: 320px;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: var(--green); color: white; }
    #toast.fail { background: var(--red); color: white; }

    /* REPORT */
    .report-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
    }
    .report-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--green);
      display: flex; align-items: center; gap: 8px;
    }
    .badge {
      background: var(--green-pale);
      color: var(--green);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* TABLE */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    thead { background: var(--green); color: white; }
    thead th {
      padding: 13px 16px; text-align: left;
      font-weight: 600; font-size: 0.82rem;
      letter-spacing: 0.05em; text-transform: uppercase;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--green-pale); }
    tbody td { padding: 13px 16px; vertical-align: middle; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 600;
    }
    .status-urgent { background: var(--red-pale); color: var(--red); }
    .status-soon   { background: var(--amber-pale); color: var(--amber); }
    .status-ok     { background: var(--green-pale); color: var(--green); }

    .btn-del {
      background: none; border: 1.5px solid var(--border);
      border-radius: 8px; padding: 5px 10px;
      cursor: pointer; font-size: 0.85rem; color: var(--muted);
      transition: all 0.15s;
    }
    .btn-del:hover { border-color: var(--red); color: var(--red); background: var(--red-pale); }

    .empty {
      text-align: center; padding: 48px 24px;
      color: var(--muted); font-size: 0.95rem;
    }
    .empty span { font-size: 2.5rem; display: block; margin-bottom: 10px; }

    .spinner { display: inline-block; width: 16px; height: 16px;
      border: 2px solid #fff; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="pill">💊</div>
  <div>
    <h1>Medicine Stock Tracker</h1>
    <p>Track your medicines — know exactly when to restock</p>
  </div>
</header>

<div class="page">

  <!-- FORM -->
  <div class="card">
    <h2>➕ Add Medicine</h2>
    <div class="form-grid">
      <div>
        <label for="name">Medicine Name</label>
        <input type="text" id="name" placeholder="e.g. Paracetamol 500mg" />
        <div class="error-msg" id="err-name"></div>
      </div>
      <div>
        <label for="stock">Stock Quantity</label>
        <input type="number" id="stock" placeholder="e.g. 30" min="1" max="10000" />
        <div class="error-msg" id="err-stock"></div>
      </div>
      <div>
        <label for="doses">Doses Per Day</label>
        <input type="number" id="doses" placeholder="e.g. 2" min="1" max="20" />
        <div class="error-msg" id="err-doses"></div>
      </div>
    </div>
    <button class="btn-add" id="addBtn" onclick="addMedicine()">
      <span>Add & Calculate</span>
    </button>
  </div>

  <!-- REPORT -->
  <div class="card">
    <div class="report-header">
      <h2>📋 Stock Report</h2>
      <span class="badge" id="count-badge">0 medicines</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Medicine</th>
            <th>Stock (qty)</th>
            <th>Doses/Day</th>
            <th>Finish Date</th>
            <th>Restock Date</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="report-body">
          <tr><td colspan="8" class="empty"><span>💊</span>No medicines added yet.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
  const API = "";  // same origin — FastAPI serves this page

  function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "show " + type;
    setTimeout(() => t.className = "", 3000);
  }

  function clearErrors() {
    ["err-name","err-stock","err-doses"].forEach(id => {
      document.getElementById(id).textContent = "";
    });
    ["name","stock","doses"].forEach(id => {
      document.getElementById(id).classList.remove("error");
    });
  }

  function validate() {
    let ok = true;
    const name  = document.getElementById("name").value.trim();
    const stock = parseInt(document.getElementById("stock").value);
    const doses = parseInt(document.getElementById("doses").value);

    if (!name || name.length < 2) {
      document.getElementById("err-name").textContent = "Enter a valid medicine name (min 2 chars)";
      document.getElementById("name").classList.add("error");
      ok = false;
    }
    if (!stock || stock <= 0 || stock > 10000) {
      document.getElementById("err-stock").textContent = "Enter a quantity between 1 and 10,000";
      document.getElementById("stock").classList.add("error");
      ok = false;
    }
    if (!doses || doses <= 0 || doses > 20) {
      document.getElementById("err-doses").textContent = "Enter doses between 1 and 20";
      document.getElementById("doses").classList.add("error");
      ok = false;
    }
    return ok;
  }

  async function addMedicine() {
    clearErrors();
    if (!validate()) return;

    const btn = document.getElementById("addBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Adding...';

    const payload = {
      name:          document.getElementById("name").value.trim(),
      stock_qty:     parseInt(document.getElementById("stock").value),
      doses_per_day: parseInt(document.getElementById("doses").value),
    };

    try {
      const res = await fetch(`${API}/medicines`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Server error");

      showToast(`✅ ${data.name} added! Finishes on ${data.finish_date}`, "success");
      document.getElementById("name").value  = "";
      document.getElementById("stock").value = "";
      document.getElementById("doses").value = "";
      loadReport();
    } catch (e) {
      showToast("❌ " + e.message, "fail");
    } finally {
      btn.disabled = false;
      btn.innerHTML = "<span>Add & Calculate</span>";
    }
  }

  async function deleteMedicine(id, name) {
    if (!confirm(`Remove "${name}" from the list?`)) return;
    try {
      await fetch(`${API}/medicines/${id}`, { method: "DELETE" });
      showToast(`🗑️ ${name} removed`, "success");
      loadReport();
    } catch(e) {
      showToast("❌ Could not delete", "fail");
    }
  }

  function statusBadge(restockDate) {
    const today = new Date(); today.setHours(0,0,0,0);
    const rd    = new Date(restockDate);
    const diff  = Math.ceil((rd - today) / (1000*60*60*24));
    if (diff <= 0)  return `<span class="status-badge status-urgent">🔴 Restock Now</span>`;
    if (diff <= 3)  return `<span class="status-badge status-soon">🟡 Restock Soon</span>`;
    return `<span class="status-badge status-ok">🟢 OK</span>`;
  }

  async function loadReport() {
    try {
      const res  = await fetch(`${API}/medicines`);
      const data = await res.json();
      const meds = data.medicines;
      const tbody = document.getElementById("report-body");
      document.getElementById("count-badge").textContent =
        meds.length + " medicine" + (meds.length !== 1 ? "s" : "");

      if (meds.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty"><span>💊</span>No medicines added yet.</td></tr>`;
        return;
      }

      tbody.innerHTML = meds.map((m, i) => `
        <tr>
          <td style="color:var(--muted);font-size:0.85rem">${i + 1}</td>
          <td><strong>${m.name}</strong></td>
          <td>${m.stock_qty}</td>
          <td>${m.doses_per_day}</td>
          <td>${m.finish_date}</td>
          <td><strong>${m.restock_date}</strong></td>
          <td>${statusBadge(m.restock_date)}</td>
          <td><button class="btn-del" onclick="deleteMedicine(${m.id}, '${m.name}')">✕ Remove</button></td>
        </tr>
      `).join("");
    } catch(e) {
      console.error("Failed to load report", e);
    }
  }

  // Allow Enter key to submit
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") addMedicine();
  });

  // Load existing data on page open
  loadReport();
</script>
</body>
</html>
